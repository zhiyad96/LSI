<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — LIS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      border: none; border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
      width: 100%; max-width: 420px;
    }
    .logo-wrap {
      width: 56px; height: 56px; background: #0d6efd;
      border-radius: 14px; display: flex;
      align-items: center; justify-content: center; margin: 0 auto 1rem;
    }
  </style>
</head>
<body>
<div class="card p-4">

  <div class="logo-wrap"><i class="bi bi-activity fs-3 text-white"></i></div>
  <h4 class="text-center fw-bold mb-1">LIS Portal</h4>
  <p class="text-center text-muted mb-4" style="font-size:.88rem;">Laboratory Information System</p>

  <!-- Alerts -->
  <div id="error-alert"   class="alert alert-danger  py-2 d-none"></div>
  <div id="success-alert" class="alert alert-success py-2 d-none"></div>

  <!-- Form — no action/method, JS handles submit -->
  <form id="login-form">
    {% csrf_token %}

    <div class="mb-3">
      <label class="form-label fw-semibold">Username</label>
      <div class="input-group">
        <span class="input-group-text bg-light border-end-0">
          <i class="bi bi-person text-muted"></i>
        </span>
        <input type="text" id="username" class="form-control border-start-0"
               placeholder="Enter username" required autofocus>
        <div class="invalid-feedback" id="err-username"></div>
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label fw-semibold">Password</label>
      <div class="input-group">
        <span class="input-group-text bg-light border-end-0">
          <i class="bi bi-lock text-muted"></i>
        </span>
        <input type="password" id="password" class="form-control border-start-0"
               placeholder="Enter password" required>
        <button type="button" class="btn btn-outline-secondary" id="togglePwd">
          <i class="bi bi-eye" id="eyeIcon"></i>
        </button>
      </div>
    </div>

    <button type="submit" id="login-btn" class="btn btn-primary w-100 py-2 fw-semibold">
      <span id="btn-text"><i class="bi bi-box-arrow-in-right me-1"></i> Sign In</span>
      <span id="btn-spinner" class="d-none">
        <span class="spinner-border spinner-border-sm me-1"></span> Signing in...
      </span>
    </button>
  </form>

    <div class="mt-4 text-center">
      <span class="text-muted">Don't have an account?</span>
      <a href="{% url 'accounts:register' %}" class="text-decoration-none fw-semibold">Sign Up</a>
    </div>


</div>

<script>
  // ── CSRF token from cookie ─────────────────────────────────────────────
  function getCookie(name) {
    const value = `; ${document.cookie}`;
    const parts = value.split(`; ${name}=`);
    if (parts.length === 2) return parts.pop().split(';').shift();
  }

  // ── Toggle password ────────────────────────────────────────────────────
  document.getElementById('togglePwd').addEventListener('click', () => {
    const pwd  = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    pwd.type   = pwd.type === 'password' ? 'text' : 'password';
    icon.className = pwd.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
  });

  // ── Loading state ──────────────────────────────────────────────────────
  function setLoading(on) {
    document.getElementById('btn-text').classList.toggle('d-none', on);
    document.getElementById('btn-spinner').classList.toggle('d-none', !on);
    document.getElementById('login-btn').disabled = on;
  }

  // ── Show alerts ────────────────────────────────────────────────────────
  function showError(msg) {
    const el = document.getElementById('error-alert');
    el.innerHTML = `<i class="bi bi-exclamation-circle me-1"></i>${msg}`;
    el.classList.remove('d-none');
    document.getElementById('success-alert').classList.add('d-none');
  }

  function showSuccess(msg) {
    const el = document.getElementById('success-alert');
    el.innerHTML = `<i class="bi bi-check-circle me-1"></i>${msg}`;
    el.classList.remove('d-none');
    document.getElementById('error-alert').classList.add('d-none');
  }

  // ── Form submit → fetch API ────────────────────────────────────────────
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    setLoading(true);

    try {
      const res = await fetch('/api/login/', {
        method:  'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken':  getCookie('csrftoken'),
        },
        credentials: 'same-origin',
        body: JSON.stringify({
          username: document.getElementById('username').value.trim(),
          password: document.getElementById('password').value,
        }),
      });

      const data = await res.json();

      if (res.ok && data.success) {
        showSuccess('Login successful! Redirecting...');
        setTimeout(() => window.location.href = '/dashboard/', 800);
      } else {
        const errors = data.errors || {};
        const msg = errors.non_field_errors?.[0]
                 || errors.username?.[0]
                 || errors.password?.[0]
                 || 'Invalid credentials.';
        showError(msg);
      }

    } catch {
      showError('Network error. Please check your connection.');
    } finally {
      setLoading(false);
    }
  });
</script>

</body>
</html>
