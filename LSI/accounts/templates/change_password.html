<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password — LIS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      width: 100%;
      max-width: 480px;
      border: none;
      border-radius: 18px;
      box-shadow: 0 18px 60px rgba(0,0,0,.25);
    }
    .logo-wrap {
      width: 56px; height: 56px;
      display: flex; align-items: center;
      justify-content: center; margin: 0 auto 1rem;
      background: #0d6efd; border-radius: 16px;
    }
  </style>
</head>
<body>
<div class="card p-4">
  <div class="logo-wrap"><i class="bi bi-key-fill fs-3 text-white"></i></div>
  <h4 class="text-center fw-bold mb-1">Change Password</h4>
  <p class="text-center text-muted mb-4" style="font-size:.92rem;">Only admin users may update their password here.</p>

  <div id="error-alert" class="alert alert-danger py-2 d-none"></div>
  <div id="success-alert" class="alert alert-success py-2 d-none"></div>

  <form id="change-password-form">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label fw-semibold">New Password</label>
      <input type="password" id="password" class="form-control" required minlength="8" placeholder="Enter new password">
      <div class="invalid-feedback" id="err-password"></div>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Confirm New Password</label>
      <input type="password" id="confirm_password" class="form-control" required minlength="8" placeholder="Confirm new password">
      <div class="invalid-feedback" id="err-confirm_password"></div>
    </div>
    <button type="submit" id="submit-btn" class="btn btn-primary w-100 py-2 fw-semibold">
      <span id="btn-text"><i class="bi bi-check2-circle me-1"></i> Update Password</span>
      <span id="btn-spinner" class="d-none"><span class="spinner-border spinner-border-sm me-1"></span> Saving...</span>
    </button>
  </form>

  <div class="mt-4 text-center">
    <a href="/admin/dashboard/" class="text-white text-decoration-none">Return to dashboard</a>
  </div>
</div>

<script>
  function getCookie(name) {
    const value = `; ${document.cookie}`;
    const parts = value.split(`; ${name}=`);
    if (parts.length === 2) return parts.pop().split(';').shift();
  }

  function showError(msg) {
    const el = document.getElementById('error-alert');
    el.textContent = msg;
    el.classList.remove('d-none');
    document.getElementById('success-alert').classList.add('d-none');
  }

  function showSuccess(msg) {
    const el = document.getElementById('success-alert');
    el.textContent = msg;
    el.classList.remove('d-none');
    document.getElementById('error-alert').classList.add('d-none');
  }

  function clearErrors() {
    document.querySelectorAll('.invalid-feedback').forEach(el => el.textContent = '');
    document.querySelectorAll('.form-control').forEach(el => el.classList.remove('is-invalid'));
  }

  function setLoading(on) {
    document.getElementById('btn-text').classList.toggle('d-none', on);
    document.getElementById('btn-spinner').classList.toggle('d-none', !on);
    document.getElementById('submit-btn').disabled = on;
  }

  document.getElementById('change-password-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    clearErrors();

    const password = document.getElementById('password').value.trim();
    const confirmPassword = document.getElementById('confirm_password').value.trim();

    if (password !== confirmPassword) {
      document.getElementById('err-confirm_password').textContent = 'Passwords must match.';
      document.getElementById('confirm_password').classList.add('is-invalid');
      return;
    }

    setLoading(true);

    try {
      const res = await fetch('/api/change-password/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': getCookie('csrftoken'),
        },
        credentials: 'same-origin',
        body: JSON.stringify({ password, confirm_password: confirmPassword }),
      });

      const data = await res.json();
      if (res.ok && data.success) {
        showSuccess('Password updated. Please log in again.');
        setTimeout(() => window.location.href = '/accounts/login/', 1400);
      } else {
        if (data.errors) {
          Object.entries(data.errors).forEach(([field, messages]) => {
            const errEl = document.getElementById(`err-${field}`);
            const input = document.getElementById(field);
            if (errEl) errEl.textContent = Array.isArray(messages) ? messages[0] : messages;
            if (input) input.classList.add('is-invalid');
          });
        }
        showError(data.message || 'Could not update password.');
      }
    } catch (err) {
      showError('Network error. Please try again.');
    } finally {
      setLoading(false);
    }
  });
</script>

</body>
</html>
