<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — LIS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh; background: #f1f5f9;
      display: flex; align-items: center; justify-content: center; padding: 2rem 0;
    }
    .card { border: none; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,.08); }
  </style>
</head>
<body>
<div class="card p-4" style="width:100%; max-width:680px;">

  <h4 class="fw-bold mb-1">Create Account</h4>
  <p class="text-muted mb-4" style="font-size:.88rem;">Register a new LIS staff account</p>

  <div id="error-alert"   class="alert alert-danger  py-2 d-none"></div>
  <div id="success-alert" class="alert alert-success py-2 d-none"></div>

  <form id="register-form">
    {% csrf_token %}
    <div class="row g-3">

      <div class="col-md-6">
        <label class="form-label fw-semibold">Username *</label>
        <input type="text" id="username" class="form-control" required>
        <div class="invalid-feedback" id="err-username"></div>
      </div>

      <div class="col-md-6">
        <label class="form-label fw-semibold">Role *</label>
        <select id="role" class="form-select" required>
          <option value="">Select Role</option>
          {% for value, label in roles %}
            <option value="{{ value }}">{{ label }}</option>
          {% endfor %}
        </select>
        <div class="invalid-feedback" id="err-role"></div>
      </div>

      <div class="col-md-6">
        <label class="form-label fw-semibold">Password *</label>
        <input type="password" id="password" class="form-control" required>
        <div class="invalid-feedback" id="err-password"></div>
      </div>

      <div class="col-md-6">
        <label class="form-label fw-semibold">Confirm Password *</label>
        <input type="password" id="confirm_password" class="form-control" required>
        <div class="invalid-feedback" id="err-confirm_password"></div>
      </div>

      <div class="col-md-6">
        <label class="form-label fw-semibold">Employee ID *</label>
        <input type="text" id="employee_id" class="form-control" required>
        <div class="invalid-feedback" id="err-employee_id"></div>
      </div>

      <div class="col-md-6">
        <label class="form-label fw-semibold">Full Name *</label>
        <input type="text" id="full_name" class="form-control" required>
        <div class="invalid-feedback" id="err-full_name"></div>
      </div>

      <div class="col-md-6">
        <label class="form-label fw-semibold">Designation *</label>
        <input type="text" id="designation" class="form-control" required>
        <div class="invalid-feedback" id="err-designation"></div>
      </div>

      <div class="col-md-6">
        <label class="form-label fw-semibold">Department</label>
        <input type="text" id="department" class="form-control">
      </div>

      <div class="col-md-6">
        <label class="form-label fw-semibold">Phone</label>
        <input type="text" id="phone" class="form-control">
      </div>

      <div class="col-12 mt-2">
        <button type="submit" id="register-btn" class="btn btn-primary w-100 py-2 fw-semibold">
          <span id="btn-text"><i class="bi bi-person-plus me-1"></i> Create Account</span>
          <span id="btn-spinner" class="d-none">
            <span class="spinner-border spinner-border-sm me-1"></span> Creating...
          </span>
        </button>
      </div>

      <div class="col-12 text-center">
        <small class="text-muted">
          Already have an account? <a href="/auth/login/">Sign in</a>
        </small>
      </div>

    </div>
  </form>
</div>

<script>
  function getCookie(name) {
    const value = `; ${document.cookie}`;
    const parts = value.split(`; ${name}=`);
    if (parts.length === 2) return parts.pop().split(';').shift();
  }

  function clearErrors() {
    document.querySelectorAll('.invalid-feedback').forEach(el => el.textContent = '');
    document.querySelectorAll('.form-control, .form-select').forEach(el => {
      el.classList.remove('is-invalid');
    });
  }

  function showFieldErrors(errors) {
    for (const [field, messages] of Object.entries(errors)) {
      const errEl   = document.getElementById(`err-${field}`);
      const inputEl = document.getElementById(field);
      if (errEl)   errEl.textContent = Array.isArray(messages) ? messages[0] : messages;
      if (inputEl) inputEl.classList.add('is-invalid');
    }
    const nonField = errors.non_field_errors;
    if (nonField) {
      const el = document.getElementById('error-alert');
      el.textContent = nonField[0];
      el.classList.remove('d-none');
    }
  }

  function setLoading(on) {
    document.getElementById('btn-text').classList.toggle('d-none', on);
    document.getElementById('btn-spinner').classList.toggle('d-none', !on);
    document.getElementById('register-btn').disabled = on;
  }

  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    clearErrors();
    setLoading(true);

    const fields = ['username','password','confirm_password','role',
                    'employee_id','full_name','designation','department','phone'];
    const payload = {};
    fields.forEach(f => {
      const el = document.getElementById(f);
      if (el) payload[f] = el.value.trim();
    });

    try {
      const res = await fetch('/api/register/', {
        method:  'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken':  getCookie('csrftoken'),
        },
        credentials: 'same-origin',
        body: JSON.stringify(payload),
      });

      const data = await res.json();

      if (res.ok && data.success) {
        const el = document.getElementById('success-alert');
        el.innerHTML = `<i class="bi bi-check-circle me-1"></i>Account created! Redirecting...`;
        el.classList.remove('d-none');
        setTimeout(() => window.location.href = '/dashboard/', 1000);
      } else {
        showFieldErrors(data.errors || {});
      }

    } catch {
      document.getElementById('error-alert').textContent = 'Network error. Please try again.';
      document.getElementById('error-alert').classList.remove('d-none');
    } finally {
      setLoading(false);
    }
  });
</script>

</body>
</html>
